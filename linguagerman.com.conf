# ============================================
# BƯỚC 1: Dùng file này TRƯỚC khi xin Certbot
# ============================================
# Copy file này vào: /etc/nginx/sites-available/linguagerman.com.conf
# Sau đó: sudo ln -s /etc/nginx/sites-available/linguagerman.com.conf /etc/nginx/sites-enabled/
# Rồi:   sudo nginx -t && sudo systemctl reload nginx
#
# Xin cert:
#   sudo certbot --nginx -d linguagerman.com
#
# Certbot sẽ TỰ ĐỘNG sửa file này thêm SSL.
# Nếu muốn cấu hình thủ công, sau khi có cert, thay bằng file linguagerman.com.ssl.conf
# ============================================

upstream nextjs_linguagerman {
    server 127.0.0.1:3080;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name linguagerman.com;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files cache (Next.js _next/static)
    location /_next/static {
        proxy_pass http://nextjs_linguagerman;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=5184000, immutable";
    }

    # Static images cache
    location /images {
        proxy_pass http://nextjs_linguagerman;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API routes - no cache, longer timeout for AI grading
    location /api {
        proxy_pass http://nextjs_linguagerman;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Main app
    location / {
        proxy_pass http://nextjs_linguagerman;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/linguagerman.com.access.log;
    error_log /var/log/nginx/linguagerman.com.error.log;
}
