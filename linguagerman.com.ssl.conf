# ============================================
# BƯỚC 2: Dùng file này SAU KHI đã có SSL cert
# ============================================
# Thay thế file linguagerman.com.conf bằng file này
# sau khi đã chạy certbot thành công.
# ============================================

upstream nextjs_linguagerman {
    server 127.0.0.1:3080;
    keepalive 64;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name linguagerman.com www.linguagerman.com;

    location / {
        return 301 https://linguagerman.com$request_uri;
    }
}

# www -> non-www redirect (SEO canonical)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.linguagerman.com;

    ssl_certificate /etc/letsencrypt/live/linguagerman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linguagerman.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://linguagerman.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name linguagerman.com;

    ssl_certificate /etc/letsencrypt/live/linguagerman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linguagerman.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static files cache
    location /_next/static {
        proxy_pass http://nextjs_linguagerman;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=5184000, immutable";
    }

    location /images {
        proxy_pass http://nextjs_linguagerman;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API routes
    location /api {
        proxy_pass http://nextjs_linguagerman;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Main app
    location / {
        proxy_pass http://nextjs_linguagerman;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/linguagerman.com.access.log;
    error_log /var/log/nginx/linguagerman.com.error.log;
}
